<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="settings-container">
        <h1>Turnier Einstellungen</h1>

        <label>Turnier Titel:</label>
        <input type="text" id="title-input" placeholder="Rocket League Turnier">

        <h2>Teams</h2>
        <div id="team-inputs"></div>

        <button id="shuffle-btn">Teams mischen</button>
        <button id="save-btn">Speichern</button>

        <h2>Match Ergebnisse</h2>
        <div id="match-controls"></div>
    </div>

    <script src="js/settings.js"></script>
</body>
</html>
